version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    gcflags:
      - all=-trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: '{{ .ProjectName }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

#changelog:
#  sort: asc
#    exclude:
#  filters:
#      - '^docs:'
#      - '^test:'

changelog:
  use: github-native

