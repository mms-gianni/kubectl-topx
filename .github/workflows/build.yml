name: Build & Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
      id: checkout

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: stable

    - name: Run tests
      run: make test

    - uses: goreleaser/goreleaser-action@v6
      if: startsWith(github.ref, 'refs/tags/')
      name: Release
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    #- name: Update new version in krew-index
    #  if: startsWith(github.ref, 'refs/tags/')
    #  uses: rajatjindal/krew-release-bot@v0.0.51
    #  with:
    #    krew_template_file: .krew.yaml

  krew:
    name: Generate Krew Manifest
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      
    - name: Generate krew.yaml
      run: |
        docker run -v "$PWD/.krew.yaml:/tmp/.krew.yaml" ghcr.io/rajatjindal/krew-release-bot:v0.0.50 krew-release-bot template --tag ${{ github.ref_name }} --template-file /tmp/.krew.yaml > plugins/topx.yaml
    
    - name: Commit and push updated topx.yaml
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add plugins/topx.yaml
        git commit -m "Update plugins/topx.yaml to version ${{ github.ref_name }}"
        git push origin HEAD:main
    
    - name: Upload topx.yaml to release
      uses: softprops/action-gh-release@v2
      with:
        files: plugins/topx.yaml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
